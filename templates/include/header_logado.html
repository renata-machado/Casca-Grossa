<style>
.cg-header-logado {
    background: #fff;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    position: sticky;
    top: 0;
    z-index: 1000;
    font-family: 'Nunito', sans-serif;
}

.cg-header-logado .cg-top-bar {
    background: #5a8520;
    padding: 6px 32px;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 20px;
}
.cg-header-logado .cg-top-bar a {
    color: rgba(255,255,255,0.85);
    text-decoration: none;
    font-size: 0.82rem;
    font-weight: 600;
    transition: color 0.2s;
}
.cg-header-logado .cg-top-bar a:hover { color: #fff; }

.cg-header-logado .cg-main-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 32px;
    gap: 16px;
}

.cg-header-logado .cg-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    flex-shrink: 0;
}
.cg-header-logado .cg-brand img { height: 44px; width: auto; }
.cg-header-logado .cg-brand-name {
    font-family: 'Pompierre', serif;
    font-size: 1.3rem;
    color: #5a8520;
}

.cg-header-logado .cg-search {
    flex: 1;
    max-width: 520px;
    display: flex;
    align-items: center;
    background: #f4f7ef;
    border: 1.5px solid #d0e0b0;
    border-radius: 30px;
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
}
.cg-header-logado .cg-search:focus-within {
    border-color: #7aaa2e;
    box-shadow: 0 0 0 3px rgba(122,170,46,0.12);
}
.cg-header-logado .cg-search input {
    flex: 1;
    border: none;
    background: transparent;
    outline: none;
    padding: 10px 16px;
    font-size: 0.92rem;
    color: #333;
    font-family: 'Nunito', sans-serif;
}
.cg-header-logado .cg-search button {
    background: #7aaa2e;
    border: none;
    color: white;
    padding: 10px 20px;
    font-weight: 700;
    font-size: 0.88rem;
    cursor: pointer;
    transition: background 0.2s;
}
.cg-header-logado .cg-search button:hover { background: #5a8520; }

.cg-header-logado .cg-actions {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
}

.cg-icon-btn {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    color: #555;
    text-decoration: none;
    font-size: 1.2rem;
    transition: background 0.2s, color 0.2s;
}
.cg-icon-btn:hover {
    background: #f4f7ef;
    color: #5a8520;
}
.cg-icon-btn .badge {
    position: absolute;
    top: 2px;
    right: 2px;
    background: #e8700a;
    color: white;
    font-size: 0.6rem;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
}

.cg-perfil-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #f4f7ef;
    border: 1.5px solid #d0e0b0;
    border-radius: 25px;
    padding: 6px 14px 6px 8px;
    text-decoration: none;
    color: #444;
    font-weight: 600;
    font-size: 0.88rem;
    transition: all 0.2s;
    cursor: pointer;
}
.cg-perfil-btn:hover {
    border-color: #7aaa2e;
    color: #5a8520;
}
.cg-perfil-btn i { font-size: 1.2rem; color: #7aaa2e; }

.cg-dropdown {
    position: relative;
}
.cg-dropdown-menu {
    display: none;
    position: absolute;
    right: 0;
    top: calc(100% + 8px);
    background: white;
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    min-width: 180px;
    overflow: hidden;
    z-index: 999;
}
.cg-dropdown:hover .cg-dropdown-menu { display: block; }
.cg-dropdown-menu a {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 16px;
    text-decoration: none;
    color: #444;
    font-size: 0.88rem;
    font-weight: 600;
    transition: background 0.2s;
}
.cg-dropdown-menu a:hover { background: #f4f7ef; color: #5a8520; }
.cg-dropdown-menu a.sair { color: #dc3545; }
.cg-dropdown-menu a.sair:hover { background: #fff5f5; }
.cg-dropdown-menu hr { margin: 4px 0; border-color: #f0f0f0; }

.cg-header-logado .cg-nav-bar {
    background: #f4f7ef;
    border-top: 1px solid #e0ecd0;
    padding: 8px 32px;
    display: flex;
    align-items: center;
    gap: 4px;
}
.cg-header-logado .cg-nav-bar a {
    color: #444;
    text-decoration: none;
    font-size: 0.88rem;
    font-weight: 600;
    padding: 5px 14px;
    border-radius: 20px;
    transition: background 0.2s, color 0.2s;
}
.cg-header-logado .cg-nav-bar a:hover {
    background: #d8edb8;
    color: #3d6015;
}

.cg-hamburger-logado {
    display: none;
    background: none;
    border: none;
    font-size: 1.6rem;
    color: #5a8520;
    cursor: pointer;
}

.cg-mobile-menu-logado {
    display: none;
    flex-direction: column;
    background: white;
    border-top: 1px solid #e8efda;
}
.cg-mobile-menu-logado.open { display: flex; }
.cg-mobile-menu-logado a {
    padding: 12px 24px;
    text-decoration: none;
    color: #444;
    font-weight: 600;
    font-size: 0.92rem;
    border-bottom: 1px solid #f5f5f5;
}
.cg-mobile-menu-logado a:hover { background: #f4f7ef; color: #5a8520; }
.cg-mobile-menu-logado a.sair { color: #dc3545; }

@media (max-width: 768px) {
    .cg-header-logado .cg-main-bar { padding: 10px 16px; }
    .cg-header-logado .cg-search { display: none; }
    .cg-header-logado .cg-actions { display: none; }
    .cg-header-logado .cg-nav-bar { display: none; }
    .cg-header-logado .cg-top-bar { display: none; }
    .cg-hamburger-logado { display: block; }
}
</style>
