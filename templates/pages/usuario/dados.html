{% extends 'shared/base_privada.html' %}
{% block subtitulo %}Dados Pessoais{% endblock %}

{% block conteudo %}
<style>
.form-wrapper {
    max-width: 580px;
    margin: 40px auto;
    padding: 0 16px 48px;
    font-family: 'Nunito', sans-serif;
}

.form-card {
    background: white;
    border-radius: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    overflow: hidden;
}

.form-card-header {
    background: linear-gradient(135deg, #5a8520, #7aaa2e);
    padding: 24px 28px;
}
.form-card-header h3 {
    font-family: 'Pompierre', serif;
    color: white;
    font-size: 1.4rem;
    margin: 0 0 4px;
}
.form-card-header p {
    color: rgba(255,255,255,0.8);
    font-size: 0.85rem;
    margin: 0;
}

.form-card-body {
    padding: 28px;
    display: flex;
    flex-direction: column;
    gap: 18px;
}

.form-group label {
    display: block;
    font-size: 0.82rem;
    font-weight: 700;
    color: #555;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
}
.form-group input {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid #dde8cc;
    border-radius: 10px;
    font-size: 0.95rem;
    color: #333;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    box-sizing: border-box;
    font-family: 'Nunito', sans-serif;
}
.form-group input:focus {
    border-color: #7aaa2e;
    box-shadow: 0 0 0 3px rgba(122,170,46,0.12);
}

.form-card-footer {
    padding: 20px 28px 28px;
    display: flex;
    gap: 10px;
    border-top: 1px solid #f5f5f5;
}

.btn-salvar {
    background: #7aaa2e;
    color: white;
    border: none;
    border-radius: 10px;
    padding: 12px 28px;
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    font-family: 'Nunito', sans-serif;
}
.btn-salvar:hover { background: #5a8520; transform: translateY(-1px); }

.btn-cancelar {
    background: transparent;
    color: #aaa;
    border: 1.5px solid #eee;
    border-radius: 10px;
    padding: 12px 20px;
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Nunito', sans-serif;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
}
.btn-cancelar:hover { border-color: #ccc; color: #666; }
</style>

<div class="form-wrapper">
    <div class="form-card">
        <div class="form-card-header">
            <h3><i class="bi bi-person-circle me-2"></i>Dados Pessoais</h3>
            <p>Atualize suas informações de perfil</p>
        </div>

        <form action="/usuario/post_dados" method="post">
            <div class="form-card-body">

                <div class="form-group">
                    <label for="nome">Nome completo</label>
                    <input type="text" id="nome" name="nome"
                        placeholder="Seu nome"
                        value="{{ request.state.usuario.nome if request.state.usuario else '' }}">
                </div>

                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email"
                        placeholder="seu@email.com"
                        value="{{ request.state.usuario.email if request.state.usuario else '' }}">
                </div>

                <div class="form-group">
                    <label for="telefone">Telefone</label>
                    <input type="text" id="telefone" name="telefone"
                        placeholder="(00) 00000-0000">
                </div>

            </div>

            <div class="form-card-footer">
                <button type="submit" class="btn-salvar">
                    <i class="bi bi-check-lg me-2"></i>Salvar alterações
                </button>
                <a href="/perfil" class="btn-cancelar">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
